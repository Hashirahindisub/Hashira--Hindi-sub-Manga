<!DOCTYPE html>
<html lang="hi">
<<meta name="google-site-verification" content="GiM14awSfoSf9Vxgv1eFOwqfeFaqCughMw7bkyJ0P30" />>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hashira Hindi Sub — Manga, Manhwa, Manhua Hindi Mein</title>
<meta name="description" content="Hashira Hindi Sub — manga, manhwa, manhua bilkul free Hindi mein.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Hind:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#090910;--bg2:#11111c;--bg3:#18182a;--accent:#e8213c;
  --orange:#ff7a1a;--gold:#ffbe33;--blue:#3d8bff;--text:#e8e8f8;--muted:#6868a0;
  --fd:'Bebas Neue',sans-serif;--fu:'Rajdhani',sans-serif;--fb:'Hind',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
a{color:inherit;text-decoration:none}
button{border:none;cursor:pointer;font-family:inherit;background:none}

header{position:sticky;top:0;z-index:100;height:60px;background:rgba(9,9,16,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:var(--fd);font-size:22px;letter-spacing:3px}
.logo-acc{color:var(--accent)}
.hnav{display:flex;gap:8px}
.hnav a{font-family:var(--fu);font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;color:var(--muted);transition:.2s}
.hnav a:hover{color:var(--text);background:var(--bg3)}
.admin-btn{background:var(--accent);color:#fff;padding:6px 14px;border-radius:6px;font-family:var(--fu);font-size:11px;font-weight:700;transition:.2s}
.admin-btn:hover{background:var(--orange)}

.hero{padding:60px 20px 80px;text-align:center;background:linear-gradient(180deg,rgba(232,33,60,.08) 0%,transparent 100%)}
.hero h1{font-family:var(--fd);font-size:clamp(48px,8vw,96px);line-height:.9;margin-bottom:16px;letter-spacing:2px}
.hero .grad{background:linear-gradient(130deg,var(--accent),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-family:var(--fu);font-size:16px;color:var(--muted);margin-bottom:24px;max-width:600px;margin-left:auto;margin-right:auto}
.hero-btns{display:flex;gap:12px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(130deg,var(--accent),var(--orange));color:#fff;padding:10px 24px;border-radius:8px;font-family:var(--fu);font-weight:700;transition:.2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,33,60,.3)}

.sec{max-width:1200px;margin:0 auto;padding:48px 20px}
.sec-title{font-family:var(--fd);font-size:24px;letter-spacing:2px;margin-bottom:24px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.scard{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s;text-decoration:none}
.scard:hover{transform:translateY(-4px);border-color:rgba(232,33,60,.3)}
.scard img{width:100%;height:220px;object-fit:cover}
.scard-info{padding:10px}
.scard-type{font-family:var(--fu);font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
.scard-name{font-family:var(--fu);font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.2}
.scard-meta{display:flex;justify-content:space-between;font-family:var(--fu);font-size:11px;color:var(--muted)}

.ch-list{padding:20px}
.ch-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.2s;text-decoration:none;color:inherit}
.ch-item:hover{border-color:rgba(232,33,60,.2);background:var(--bg3)}
.ch-num{font-family:var(--fd);font-size:20px;color:var(--muted);min-width:50px}
.ch-info{flex:1}
.ch-name{font-family:var(--fu);font-size:14px;font-weight:700}
.ch-pages{font-family:var(--fu);font-size:11px;color:var(--muted);margin-top:2px}

.pdf-viewer{max-width:800px;margin:0 auto;padding:20px}
.pdf-controls{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pdf-btns{display:flex;gap:8px}
.pdf-btn{background:var(--bg3);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:6px 12px;border-radius:6px;font-family:var(--fu);font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.pdf-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.pdf-btn:disabled{opacity:.4;cursor:not-allowed}
.pdf-info{font-family:var(--fu);font-size:12px;color:var(--muted)}
.pdf-frame{width:100%;height:600px;border:1px solid rgba(255,255,255,.07);border-radius:6px}

.admin-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.admin-box{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;padding:24px}
.admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:16px}
.admin-title{font-family:var(--fd);font-size:24px}
.admin-close{font-size:24px;cursor:pointer;color:var(--muted);transition:.2s}
.admin-close:hover{color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.form-input,.form-select{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,.07);color:var(--text);padding:8px 10px;border-radius:6px;font-family:var(--fb);font-size:13px}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--accent)}
.form-btn{background:var(--accent);color:#fff;width:100%;padding:10px;border-radius:6px;font-family:var(--fu);font-weight:700;font-size:12px;cursor:pointer;transition:.2s;text-transform:uppercase}
.form-btn:hover{background:var(--orange)}
.upload-area{background:var(--bg3);border:2px dashed rgba(255,255,255,.2);padding:16px;border-radius:6px;text-align:center;cursor:pointer;transition:.2s}
.upload-area:hover{border-color:var(--accent)}
.upload-area p{font-family:var(--fu);font-size:12px;color:var(--muted)}
.upload-area input{display:none}

.series-list{background:var(--bg3);border-radius:6px;padding:12px;margin-top:16px}
.series-item{background:var(--bg2);padding:10px;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.series-item h4{font-family:var(--fu);font-size:13px}
.btn-small{padding:4px 8px;border-radius:4px;font-family:var(--fu);font-size:10px;font-weight:700;cursor:pointer;background:rgba(232,33,60,.2);color:var(--accent);transition:.2s}
.btn-small:hover{background:rgba(232,33,60,.4)}

footer{background:var(--bg2);border-top:1px solid rgba(255,255,255,.07);padding:32px 20px;text-align:center;margin-top:48px}
footer p{font-family:var(--fu);font-size:12px;color:var(--muted)}
footer .acc{color:var(--accent)}

@media(max-width:700px){
  .hnav{display:none}
  .sgrid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .pdf-controls{flex-direction:column}
  .pdf-frame{height:400px}
}
</style>
</head>
<body>

<header>
  <div class="logo">HASHIRA<span class="logo-acc"> SUB</span></div>
  <nav class="hnav">
    <a href="#home">Home</a>
    <a href="#about">About</a>
  </nav>
  <button class="admin-btn" onclick="showAdmin()">🔐 Admin</button>
</header>

<div id="app"></div>

<footer>
  <p>&copy; 2026 <span class="acc">Hashira Hindi Sub</span> | Free Manga Reader in Hindi</p>
</footer>

<div id="admin-modal" class="admin-modal" style="display:none">
  <div class="admin-box">
    <div class="admin-head">
      <div class="admin-title">Admin Panel</div>
      <span class="admin-close" onclick="closeAdmin()">✕</span>
    </div>
    <div id="admin-content"></div>
  </div>
</div>

<script>
const ADMIN_EMAIL = "mdaashiq7814@gmail.com";
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ======== STORAGE ========
function getData() {
  let data = localStorage.getItem('hashira_data');
  return data ? JSON.parse(data) : {
    series: [{
      id: "demo",
      title: "Demo Series",
      type: "manhwa",
      cover: "https://picsum.photos/300/420?random=1",
      desc: "Demo manga series",
      rating: 9.5,
      chapters: []
    }]
  };
}

function saveData(data) {
  localStorage.setItem('hashira_data', JSON.stringify(data));
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// ======== ADMIN ========
function showAdmin() {
  const email = prompt('Admin Email:');
  if (email !== ADMIN_EMAIL) {
    alert('❌ Galat Email!');
    return;
  }
  $('admin-modal').style.display = 'flex';
  renderAdmin();
}

function closeAdmin() {
  $('admin-modal').style.display = 'none';
}

function renderAdmin() {
  const data = getData();
  let html = `
    <div style="margin-bottom:20px">
      <h3 style="font-family:var(--fd);font-size:18px;margin-bottom:16px">📝 Naya Series</h3>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="adm-title" class="form-input" placeholder="Series name">
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="adm-type" class="form-select">
          <option value="manhwa">Manhwa</option>
          <option value="manga">Manga</option>
          <option value="manhua">Manhua</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cover Image</label>
        <div class="upload-area" id="cover-upload" onclick="$('cover-file').click()">
          <p>📸 Click or drag image</p>
          <input type="file" id="cover-file" accept="image/*">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" id="adm-desc" class="form-input" placeholder="Series description">
      </div>
      <div class="form-group">
        <label class="form-label">Rating (0-10)</label>
        <input type="number" id="adm-rating" class="form-input" placeholder="9.5" min="0" max="10" step="0.1">
      </div>
      <button class="form-btn" onclick="addSeries()">Add Series</button>
    </div>

    <h3 style="font-family:var(--fd);font-size:18px;margin-bottom:12px">📚 Series (${data.series.length})</h3>
    <div class="series-list">
      ${data.series.map((s, i) => `
        <div class="series-item">
          <div>
            <h4>${esc(s.title)}</h4>
            <p style="font-size:11px;color:var(--muted)">${s.chapters.length} chapters</p>
          </div>
          <button class="btn-small" onclick="editSeries(${i})">Edit</button>
        </div>
      `).join('')}
    </div>
  `;
  
  $('admin-content').innerHTML = html;
  
  const uploadArea = $('cover-upload');
  const fileInput = $('cover-file');
  
  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.style.borderColor = 'var(--accent)';
  });
  
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.style.borderColor = '';
  });
  
  uploadArea.addEventListener('drop', async e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) {
      const base64 = await fileToBase64(file);
      window.coverData = base64;
      uploadArea.innerHTML = '<p>✅ Image ready</p>';
    }
  });
  
  fileInput.addEventListener('change', async e => {
    if (e.target.files[0]) {
      const base64 = await fileToBase64(e.target.files[0]);
      window.coverData = base64;
      uploadArea.innerHTML = '<p>✅ Image ready</p>';
    }
  });
}

function addSeries() {
  const title = $('adm-title').value.trim();
  const type = $('adm-type').value;
  const desc = $('adm-desc').value.trim();
  const rating = parseFloat($('adm-rating').value) || 0;
  
  if (!title || !window.coverData || !desc) {
    alert('❌ Fill all fields!');
    return;
  }
  
  const data = getData();
  const id = title.toLowerCase().replace(/\s+/g, '-');
  
  if (data.series.find(s => s.id === id)) {
    alert('❌ Series already exists!');
    return;
  }
  
  data.series.push({
    id,
    title,
    type,
    cover: window.coverData,
    desc,
    rating,
    chapters: []
  });
  
  saveData(data);
  renderAdmin();
  window.coverData = null;
  alert('✅ Series added!');
}

function editSeries(idx) {
  const data = getData();
  const series = data.series[idx];
  
  let html = `
    <button class="form-btn" onclick="renderAdmin()" style="background:var(--bg3);color:var(--text);margin-bottom:16px">← Back</button>
    <h3 style="font-family:var(--fd);font-size:18px;margin-bottom:16px">${esc(series.title)} - Chapters</h3>
    
    <div style="margin-bottom:20px">
      <label class="form-label">Chapter Number</label>
      <input type="number" id="ch-num" class="form-input" placeholder="1" min="1">
    </div>
    
    <div style="margin-bottom:20px">
      <label class="form-label">Chapter Title</label>
      <input type="text" id="ch-title" class="form-input" placeholder="Optional">
    </div>
    
    <div style="margin-bottom:20px">
      <label class="form-label">PDF File</label>
      <div class="upload-area" id="pdf-upload" onclick="$('pdf-file').click()">
        <p>📄 Click or drag PDF</p>
        <input type="file" id="pdf-file" accept=".pdf">
      </div>
    </div>
    
    <button class="form-btn" onclick="addChapter(${idx})">Add Chapter</button>
    
    ${series.chapters.length ? `
      <h4 style="margin-top:20px;margin-bottom:12px;font-family:var(--fu)">Chapters: ${series.chapters.length}</h4>
      ${series.chapters.map((ch, ci) => `
        <div style="background:var(--bg3);padding:8px;border-radius:4px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:var(--fu);font-size:12px"><strong>Ch.${ch.num}</strong> - ${esc(ch.title)}</span>
          <button class="btn-small" onclick="deleteChapter(${idx},${ci})">Delete</button>
        </div>
      `).join('')}
    ` : '<p style="color:var(--muted);margin-top:20px">No chapters</p>'}
  `;
  
  $('admin-content').innerHTML = html;
  
  const pdfUpload = $('pdf-upload');
  const pdfFile = $('pdf-file');
  
  pdfUpload.addEventListener('dragover', e => {
    e.preventDefault();
    pdfUpload.style.borderColor = 'var(--accent)';
  });
  
  pdfUpload.addEventListener('dragleave', () => {
    pdfUpload.style.borderColor = '';
  });
  
  pdfUpload.addEventListener('drop', async e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) {
      const base64 = await fileToBase64(file);
      window.pdfData = base64;
      pdfUpload.innerHTML = '<p>✅ PDF ready</p>';
    }
  });
  
  pdfFile.addEventListener('change', async e => {
    if (e.target.files[0]) {
      const base64 = await fileToBase64(e.target.files[0]);
      window.pdfData = base64;
      pdfUpload.innerHTML = '<p>✅ PDF ready</p>';
    }
  });
}

function addChapter(seriesIdx) {
  const num = parseInt($('ch-num').value);
  const title = $('ch-title').value.trim() || `Chapter ${num}`;
  
  if (!num || !window.pdfData) {
    alert('❌ Chapter number and PDF required!');
    return;
  }
  
  const data = getData();
  const series = data.series[seriesIdx];
  
  if (series.chapters.find(c => c.num === num)) {
    alert('❌ Chapter already exists!');
    return;
  }
  
  series.chapters.push({ num, title, pdf: window.pdfData });
  series.chapters.sort((a, b) => a.num - b.num);
  
  saveData(data);
  editSeries(seriesIdx);
  window.pdfData = null;
  alert('✅ Chapter added!');
}

function deleteChapter(seriesIdx, chIdx) {
  if (!confirm('Delete chapter?')) return;
  
  const data = getData();
  data.series[seriesIdx].chapters.splice(chIdx, 1);
  saveData(data);
  editSeries(seriesIdx);
}

// ======== PAGES ========
function showHome() {
  const data = getData();
  let html = `
    <div class="hero">
      <h1>HASHIRA<br><span class="grad">HINDI SUB</span></h1>
      <p>Manga, Manhwa, Manhua — Free Hindi Mein</p>
      <div class="hero-btns">
        <a href="#" class="btn-primary">Read Now</a>
      </div>
    </div>

    <div class="sec">
      <h2 class="sec-title">📚 Series</h2>
      <div class="sgrid">
        ${data.series.map(s => `
          <a href="#series/${esc(s.id)}" class="scard">
            <img src="${esc(s.cover)}" alt="${esc(s.title)}">
            <div class="scard-info">
              <div class="scard-type">${s.type}</div>
              <div class="scard-name">${esc(s.title)}</div>
              <div class="scard-meta">
                <span>⭐ ${s.rating}</span>
                <span>${s.chapters.length}Ch</span>
              </div>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;
  $('app').innerHTML = html;
}

function showSeries(id) {
  const data = getData();
  const series = data.series.find(s => s.id === id);
  if (!series) return showHome();
  
  let html = `
    <div style="max-width:900px;margin:0 auto;padding:40px 20px">
      <a href="#" style="color:var(--accent);font-family:var(--fu);margin-bottom:20px;display:inline-block">← Back</a>
      
      <div style="display:grid;grid-template-columns:200px 1fr;gap:24px;margin-bottom:32px">
        <img src="${esc(series.cover)}" alt="${esc(series.title)}" style="width:100%;border-radius:8px">
        <div>
          <h1 style="font-family:var(--fd);font-size:32px;margin-bottom:8px">${esc(series.title)}</h1>
          <p style="color:var(--gold);font-family:var(--fu);margin-bottom:16px">⭐ ${series.rating}/10</p>
          <p style="color:var(--muted);line-height:1.6;margin-bottom:16px">${esc(series.desc)}</p>
          <p style="color:var(--muted);font-family:var(--fu);font-size:12px">${series.chapters.length} Chapters Available</p>
        </div>
      </div>

      <h2 class="sec-title">Chapters</h2>
      <div class="ch-list">
        ${series.chapters.length ? series.chapters.map(ch => `
          <a href="#read/${esc(series.id)}/${ch.num}" class="ch-item">
            <div class="ch-num">Ch.${ch.num}</div>
            <div style="flex:1">
              <div class="ch-name">${esc(ch.title)}</div>
              <div class="ch-pages">📄 PDF</div>
            </div>
          </a>
        `).join('') : '<p style="color:var(--muted)">No chapters</p>'}
      </div>
    </div>
  `;
  $('app').innerHTML = html;
}

function showReader(seriesId, chapterNum) {
  const data = getData();
  const series = data.series.find(s => s.id === seriesId);
  if (!series) return showHome();
  
  const chapter = series.chapters.find(c => c.num == chapterNum);
  if (!chapter) return showSeries(seriesId);
  
  const prevCh = series.chapters.find(c => c.num == chapterNum - 1);
  const nextCh = series.chapters.find(c => c.num == chapterNum + 1);
  
  let html = `
    <div class="pdf-viewer">
      <div class="pdf-controls">
        <div class="pdf-btns">
          <button class="pdf-btn" onclick="location.hash='#series/${esc(seriesId)}'">← Series</button>
          ${prevCh ? `<button class="pdf-btn" onclick="location.hash='#read/${esc(seriesId)}/${prevCh.num}'">← Prev</button>` : '<button class="pdf-btn" disabled>← Prev</button>'}
          ${nextCh ? `<button class="pdf-btn" onclick="location.hash='#read/${esc(seriesId)}/${nextCh.num}'">Next →</button>` : '<button class="pdf-btn" disabled>Next →</button>'}
        </div>
        <span class="pdf-info">${esc(chapter.title)}</span>
      </div>
      <iframe src="${esc(chapter.pdf)}" class="pdf-frame"></iframe>
    </div>
  `;
  $('app').innerHTML = html;
}

// ======== ROUTER ========
function route() {
  const hash = location.hash.slice(1).split('/');
  
  if (hash[0] === 'series' && hash[1]) {
    showSeries(hash[1]);
  } else if (hash[0] === 'read' && hash[1] && hash[2]) {
    showReader(hash[1], hash[2]);
  } else {
    showHome();
  }
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
