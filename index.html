<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="GiM14awSfoSf9Vxgv1eFOwqfeFaqCughMw7bkyJ0P30" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hashira Hindi Sub — Manga, Manhwa, Manhua Hindi Mein</title>
<meta name="description" content="Hashira Hindi Sub — manga, manhwa, manhua bilkul free Hindi mein.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Hind:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#090910;--bg2:#11111c;--bg3:#18182a;--accent:#e8213c;--orange:#ff7a1a;--gold:#ffbe33;--text:#e8e8f8;--muted:#6868a0;--fd:'Bebas Neue',sans-serif;--fu:'Rajdhani',sans-serif;--fb:'Hind',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
a{color:inherit;text-decoration:none}
button{border:none;cursor:pointer;font-family:inherit;background:none}
header{position:sticky;top:0;z-index:100;height:60px;background:rgba(9,9,16,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:var(--fd);font-size:22px;letter-spacing:3px}
.logo-acc{color:var(--accent)}
.hnav a{font-family:var(--fu);font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;color:var(--muted)}
.admin-btn{background:var(--accent);color:#fff;padding:6px 14px;border-radius:6px;font-family:var(--fu);font-size:11px;font-weight:700}
.hero{padding:60px 20px 80px;text-align:center;background:linear-gradient(180deg,rgba(232,33,60,.08),transparent)}
.hero h1{font-family:var(--fd);font-size:clamp(48px,8vw,96px);line-height:.9;margin-bottom:16px;letter-spacing:2px}
.hero .grad{background:linear-gradient(130deg,var(--accent),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-family:var(--fu);font-size:16px;color:var(--muted);max-width:600px;margin:0 auto}
.sec{max-width:1200px;margin:0 auto;padding:48px 20px}
.sec-title{font-family:var(--fd);font-size:24px;letter-spacing:2px;margin-bottom:24px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.scard{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden;transition:.2s}
.scard:hover{transform:translateY(-4px);border-color:rgba(232,33,60,.3)}
.scard img{width:100%;height:220px;object-fit:cover}
.scard-info{padding:10px}
.scard-type{font-family:var(--fu);font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:4px}
.scard-name{font-family:var(--fu);font-size:13px;font-weight:700;margin-bottom:6px}
.scard-meta{display:flex;justify-content:space-between;font-family:var(--fu);font-size:11px;color:var(--muted)}
.ch-list{padding:20px 0}
.ch-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;margin-bottom:8px}
.ch-num{font-family:var(--fd);font-size:20px;color:var(--muted);min-width:50px}
.ch-name{font-family:var(--fu);font-size:14px;font-weight:700}
.ch-pages{font-family:var(--fu);font-size:11px;color:var(--muted);margin-top:2px}
.pdf-viewer{max-width:800px;margin:0 auto;padding:20px}
.pdf-controls{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pdf-btns{display:flex;gap:8px}
.pdf-btn{background:var(--bg3);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:6px 12px;border-radius:6px;font-family:var(--fu);font-size:12px;font-weight:700}
.pdf-btn:disabled{opacity:.4}
.pdf-info{font-family:var(--fu);font-size:12px;color:var(--muted)}
.pdf-frame{width:100%;height:80vh;border:1px solid rgba(255,255,255,.07);border-radius:6px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.box{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:8px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px}
.box-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:16px}
.box-title{font-family:var(--fd);font-size:24px}
.box-close{font-size:24px;cursor:pointer;color:var(--muted)}
.fg{margin-bottom:14px}
.fl{display:block;font-family:var(--fu);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.fi,.fs{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,.07);color:var(--text);padding:9px 10px;border-radius:6px;font-family:var(--fb);font-size:13px}
.fi:focus,.fs:focus{outline:none;border-color:var(--accent)}
.fbtn{background:var(--accent);color:#fff;width:100%;padding:10px;border-radius:6px;font-family:var(--fu);font-weight:700;font-size:12px;text-transform:uppercase}
.fbtn.sec{background:var(--bg3)}
.litem{background:var(--bg3);padding:10px;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.litem h4{font-family:var(--fu);font-size:13px}
.bsmall{padding:4px 8px;border-radius:4px;font-family:var(--fu);font-size:10px;font-weight:700;background:rgba(232,33,60,.2);color:var(--accent)}
footer{background:var(--bg2);border-top:1px solid rgba(255,255,255,.07);padding:32px 20px;text-align:center;margin-top:48px}
footer p{font-family:var(--fu);font-size:12px;color:var(--muted)}
footer .acc{color:var(--accent)}
.loading{text-align:center;padding:60px;color:var(--muted);font-family:var(--fu)}
@media(max-width:700px){.hnav{display:none}.sgrid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.pdf-controls{flex-direction:column}}
</style>
</head>
<body>
<header>
  <a href="#" class="logo">HASHIRA<span class="logo-acc"> SUB</span></a>
  <nav class="hnav"><a href="#">Home</a></nav>
  <button class="admin-btn" id="adminBtn">🔐 Admin</button>
</header>
<div id="app"><div class="loading">Loading...</div></div>
<footer><p>&copy; 2026 <span class="acc">Hashira Hindi Sub</span> | Free Manga Reader in Hindi</p></footer>
<div id="modal" class="modal" style="display:none">
  <div class="box">
    <div class="box-head"><div class="box-title" id="modalTitle">Admin</div><span class="box-close" id="modalClose">✕</span></div>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQosJ2XFkm1lU_M8ZpoGLp-jHQYFPIFBE",
  authDomain: "hashira-hindi-sub.firebaseapp.com",
  projectId: "hashira-hindi-sub",
  storageBucket: "hashira-hindi-sub.firebasestorage.app",
  messagingSenderId: "599285073",
  appId: "1:599285073:web:2729e08a6bf07c2d910770"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const driveId = link => { const m = String(link).match(/\/d\/([^/]+)/); return m ? m[1] : String(link).trim(); };

let SERIES = [];
let currentUser = null;

async function loadSeries(){
  try{
    const snap = await getDocs(collection(db,"series"));
    SERIES = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  }catch(e){ console.error(e); }
  route();
}

function showHome(){
  const cards = SERIES.map(s => `
    <a href="#series/${esc(s.id)}" class="scard">
      <img src="${esc(s.cover)}" alt="${esc(s.title)}" loading="lazy">
      <div class="scard-info">
        <div class="scard-type">${esc(s.type||"")}</div>
        <div class="scard-name">${esc(s.title)}</div>
        <div class="scard-meta"><span>⭐ ${esc(s.rating||0)}</span><span>${(s.chapters||[]).length} Ch</span></div>
      </div>
    </a>`).join("");
  $("app").innerHTML = `
    <div class="hero"><h1>HASHIRA<br><span class="grad">HINDI SUB</span></h1><p>Manga, Manhwa, Manhua — Free Hindi Mein</p></div>
    <div class="sec"><h2 class="sec-title">📚 Series</h2><div class="sgrid">${cards || '<p style="color:var(--muted)">Abhi koi series nahi. Admin se add karo.</p>'}</div></div>`;
}

function showSeries(id){
  const s = SERIES.find(x => x.id === id);
  if(!s) return showHome();
  const chapters = (s.chapters||[]).slice().sort((a,b)=>a.num-b.num);
  const list = chapters.length ? chapters.map(ch => `
    <a href="#read/${esc(s.id)}/${ch.num}" class="ch-item">
      <div class="ch-num">Ch.${ch.num}</div>
      <div style="flex:1"><div class="ch-name">${esc(ch.title)}</div><div class="ch-pages">📄 PDF</div></div>
    </a>`).join("") : '<p style="color:var(--muted)">No chapters</p>';
  $("app").innerHTML = `
    <div style="max-width:900px;margin:0 auto;padding:40px 20px">
      <a href="#" style="color:var(--accent);font-family:var(--fu);margin-bottom:20px;display:inline-block">← Back</a>
      <div style="display:flex;gap:24px;margin-bottom:32px;flex-wrap:wrap">
        <img src="${esc(s.cover)}" alt="${esc(s.title)}" style="width:180px;border-radius:8px">
        <div style="flex:1;min-width:200px">
          <h1 style="font-family:var(--fd);font-size:32px;margin-bottom:8px">${esc(s.title)}</h1>
          <p style="color:var(--gold);font-family:var(--fu);margin-bottom:16px">⭐ ${esc(s.rating||0)}/10</p>
          <p style="color:var(--muted);line-height:1.6">${esc(s.desc||"")}</p>
        </div>
      </div>
      <h2 class="sec-title">Chapters</h2><div class="ch-list">${list}</div>
    </div>`;
}

function showReader(seriesId, num){
  const s = SERIES.find(x => x.id === seriesId);
  if(!s) return showHome();
  const chapters = (s.chapters||[]).slice().sort((a,b)=>a.num-b.num);
  const idx = chapters.findIndex(c => String(c.num) === String(num));
  const ch = chapters[idx];
  if(!ch) return showSeries(seriesId);
  const prev = chapters[idx-1], next = chapters[idx+1];
  const pid = driveId(ch.pdf);
  $("app").innerHTML = `
    <div class="pdf-viewer">
      <div class="pdf-controls">
        <div class="pdf-btns">
          <a class="pdf-btn" href="#series/${esc(seriesId)}">← Series</a>
          ${prev ? `<a class="pdf-btn" href="#read/${esc(seriesId)}/${prev.num}">← Prev</a>` : '<button class="pdf-btn" disabled>← Prev</button>'}
          ${next ? `<a class="pdf-btn" href="#read/${esc(seriesId)}/${next.num}">Next →</a>` : '<button class="pdf-btn" disabled>Next →</button>'}
        </div>
        <span class="pdf-info">${esc(s.title)} — ${esc(ch.title)}</span>
      </div>
      <iframe src="https://drive.google.com/file/d/${esc(pid)}/preview" class="pdf-frame" allow="autoplay"></iframe>
    </div>`;
}

function route(){
  const h = location.hash.slice(1).split("/");
  if(h[0]==="series" && h[1]) showSeries(h[1]);
  else if(h[0]==="read" && h[1] && h[2]) showReader(h[1],h[2]);
  else showHome();
  window.scrollTo(0,0);
}

function openModal(t,b){ $("modalTitle").textContent=t; $("modalBody").innerHTML=b; $("modal").style.display="flex"; }
function closeModal(){ $("modal").style.display="none"; }

function renderLogin(){
  openModal("Admin Login", `
    <div class="fg"><label class="fl">Email</label><input id="lg-email" class="fi" type="email"></div>
    <div class="fg"><label class="fl">Password</label><input id="lg-pass" class="fi" type="password"></div>
    <button class="fbtn" id="lg-btn">Login</button>`);
  $("lg-btn").onclick = async () => {
    try{
      await signInWithEmailAndPassword(auth, $("lg-email").value.trim(), $("lg-pass").value);
      await reloadAndAdmin();
    }catch(e){ alert("❌ Galat email ya password!"); }
  };
}

function renderAdmin(){
  const opts = SERIES.map(s=>`<option value="${esc(s.id)}">${esc(s.title)}</option>`).join("");
  openModal("Admin Panel", `
    <h3 style="font-family:var(--fd);font-size:18px;margin-bottom:14px">➕ Nayi Series</h3>
    <div class="fg"><label class="fl">Title</label><input id="s-title" class="fi" placeholder="Solo Leveling (Hindi)"></div>
    <div class="fg"><label class="fl">Type</label><select id="s-type" class="fs"><option value="manhwa">Manhwa</option><option value="manga">Manga</option><option value="manhua">Manhua</option></select></div>
    <div class="fg"><label class="fl">Cover Image URL</label><input id="s-cover" class="fi" placeholder="https://..."></div>
    <div class="fg"><label class="fl">Description</label><input id="s-desc" class="fi"></div>
    <div class="fg"><label class="fl">Rating (0-10)</label><input id="s-rating" class="fi" type="number" step="0.1" placeholder="9.5"></div>
    <button class="fbtn" id="addSeriesBtn">Add Series</button>
    <h3 style="font-family:var(--fd);font-size:18px;margin:24px 0 14px">📄 Nayi Chapter</h3>
    <div class="fg"><label class="fl">Series</label><select id="c-series" class="fs">${opts||'<option>Pehle series banao</option>'}</select></div>
    <div class="fg"><label class="fl">Chapter Number</label><input id="c-num" class="fi" type="number" placeholder="1"></div>
    <div class="fg"><label class="fl">Chapter Title (optional)</label><input id="c-title" class="fi"></div>
    <div class="fg"><label class="fl">Google Drive PDF Link</label><input id="c-pdf" class="fi" placeholder="https://drive.google.com/file/d/..../view"></div>
    <button class="fbtn" id="addChapterBtn">Add Chapter</button>
    <h3 style="font-family:var(--fd);font-size:18px;margin:24px 0 14px">📚 Series List</h3>
    <div id="adminList"></div>
    <button class="fbtn sec" id="logoutBtn" style="margin-top:16px">Logout</button>`);
  renderAdminList();
  $("addSeriesBtn").onclick = addSeries;
  $("addChapterBtn").onclick = addChapter;
  $("logoutBtn").onclick = () => signOut(auth);
}

function renderAdminList(){
  $("adminList").innerHTML = SERIES.map(s => `
    <div class="litem"><div><h4>${esc(s.title)}</h4><span style="font-size:11px;color:var(--muted)">${(s.chapters||[]).length} chapters</span></div>
    <button class="bsmall" data-del="${esc(s.id)}">Delete</button></div>
    ${(s.chapters||[]).slice().sort((a,b)=>a.num-b.num).map(c=>`
      <div class="litem" style="margin-left:16px"><span style="font-family:var(--fu);font-size:12px">Ch.${c.num} — ${esc(c.title)}</span>
      <button class="bsmall" data-delch="${esc(s.id)}|${c.num}">x</button></div>`).join("")}
  `).join("") || '<p style="color:var(--muted)">Abhi kuch nahi</p>';
  $("adminList").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delSeries(b.dataset.del));
  $("adminList").querySelectorAll("[data-delch]").forEach(b=>b.onclick=()=>{const [sid,n]=b.dataset.delch.split("|");delChapter(sid,Number(n));});
}

async function addSeries(){
  const title=$("s-title").value.trim(), cover=$("s-cover").value.trim();
  if(!title||!cover){ alert("Title aur Cover zaroori"); return; }
  const id = title.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
  if(SERIES.find(s=>s.id===id)){ alert("Ye series pehle se hai"); return; }
  try{
    await setDoc(doc(db,"series",id), { title, type:$("s-type").value, cover, desc:$("s-desc").value.trim(), rating:parseFloat($("s-rating").value)||0, chapters:[] });
    alert("✅ Series add ho gayi!"); await reloadAndAdmin();
  }catch(e){ alert("Error: "+e.message); }
}

async function addChapter(){
  const sid=$("c-series").value, s=SERIES.find(x=>x.id===sid);
  if(!s){ alert("Pehle series banao"); return; }
  const num=parseInt($("c-num").value), pdf=$("c-pdf").value.trim();
  if(!num||!pdf){ alert("Chapter number aur PDF link zaroori"); return; }
  const chapters=(s.chapters||[]).slice();
  if(chapters.find(c=>c.num===num)){ alert("Ye chapter pehle se hai"); return; }
  chapters.push({ num, title:$("c-title").value.trim()||("Chapter "+num), pdf: driveId(pdf) });
  chapters.sort((a,b)=>a.num-b.num);
  try{ await updateDoc(doc(db,"series",sid), { chapters }); alert("✅ Chapter add ho gaya!"); await reloadAndAdmin(); }
  catch(e){ alert("Error: "+e.message); }
}

async function delSeries(id){ if(!confirm("Series delete?")) return; await deleteDoc(doc(db,"series",id)); await reloadAndAdmin(); }
async function delChapter(sid,num){ if(!confirm("Chapter delete?")) return; const s=SERIES.find(x=>x.id===sid); const chapters=(s.chapters||[]).filter(c=>c.num!==num); await updateDoc(doc(db,"series",sid), { chapters }); await reloadAndAdmin(); }

async function reloadAndAdmin(){
  const snap = await getDocs(collection(db,"series"));
  SERIES = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  renderAdmin();
}

$("adminBtn").onclick = () => { if(currentUser) renderAdmin(); else renderLogin(); };
$("modalClose").onclick = closeModal;
$("modal").onclick = e => { if(e.target.id==="modal") closeModal(); };
window.addEventListener("hashchange", route);
onAuthStateChanged(auth, user => { currentUser = user; if(!user) closeModal(); });
loadSeries();
</script>
</body>
</html>
